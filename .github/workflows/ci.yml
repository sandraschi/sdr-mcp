name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Lint and test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web_sota/package-lock.json

      - name: Install, lint, and test
        shell: pwsh
        run: |
          uv sync --extra dev
          uv run ruff check src tests
          uv run ruff format --check src tests
          uv run pytest tests -q --tb=short --cov=sdr_mcp --cov-report=term-missing

      - name: Web lint (Biome)
        shell: pwsh
        working-directory: web_sota
        run: |
          npm ci
          npm run lint
